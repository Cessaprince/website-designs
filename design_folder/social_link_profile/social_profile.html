<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Profile Links</title>
    <link rel="stylesheet" href="social_profile.css">
</head>
<body class="auth-body">
    <div class="auth-content">
        <div class="user-profile">
            <img src="profile_img.jpeg" alt="user-image" class="profile-img">
            <h2 id="username">Jessica Randall</h2>
            <p id="user-address">London, United Kingdom</p>
        </div>

        <p id="user-quote">"Front-end developer and avid writer"</p>

        <div class="links">
            <a href="" class="profile-link">Github</a>
            <a href="" class="profile-link">Frontend Mentor</a>
            <a href="" class="profile-link">LinkedIn</a>
            <a href="" class="profile-link">Twitter</a>
            <a href="" class="profile-link">Instagram</a>
        </div>


    </div>
    
</body>
</html>
