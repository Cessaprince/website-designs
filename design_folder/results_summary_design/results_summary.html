<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="results_summary.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body class="summary-body">
    <div class="result-summary-content">

        <div class="result" id="result-info">

            <h3 class="result-text">Your result</h3>

            <div class="result-percent">
                <p id="result-large-value">76</p>
                <p class="result-text">of 100</p>
            </div>

            <h2 class="result-large-text">Great</h2>

            <p class="result-text">You scored higher than 5% of 
                the people who have taken these tests.
            </p>

        </div>


        <div class="result" id="summary-info">

            <h3 class="summary-text">Summary</h3>

            
            <div class="scoring score-red">
                <div class="scoring-text">
                    <i class="fa-solid fa-bolt bolt-icon red-icon"></i>
                    <p class="scoring-text-word" id="reaction-score">Reaction</p>
                </div>
                <div class="score">
                    <p class="bold-score">
                        <span class="individual-score">80</span> 
                        <span class="result-text">/100</span>
                    </p>
                </div>
            </div>

            <div class="scoring score-yellow">
                <div class="scoring-text">
                    <i class="fa-solid fa-brain yellow-icon"></i>
                    <p class="scoring-text-word" id="memory-score">Memory</p>
                 </div>
                <div class="score">
                    <p class="bold-score">
                        <span class="individual-score">92</span> 
                        <span class="result-text">/100</span>
                    </p>                
                </div>
            </div>

            <div class="scoring score-green">
                <div class="scoring-text">
                    <i class="fa-solid fa-comment-dots icon-green green-icon"></i>
                    <p class="scoring-text-word" id="verbal-score">Verbal</p>
                 </div>
                <div class="score">
                    <p class="bold-score">
                        <span class="individual-score">61</span> 
                        <span class="result-text">/100</span>
                    </p>

                </div>
            </div>

            <div class="scoring score-purple">
                <div class="scoring-text">
                    <i class="fa-solid fa-eye icon-purple purple-icon"></i>
                    <p class="scoring-text-word" id="memory-score">Visual</p>
                 </div>
                <div class="score">
                    <p class="bold-score">
                        <span class="individual-score">73</span> 
                        <span class="result-text">/100</span>
                    </p>
                </div>
            </div>

            <button type="submit">Continue</button>

        </div>
    </div>
    
</body>
</html>
